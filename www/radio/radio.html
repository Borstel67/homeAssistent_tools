<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home Radio</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 16px; }
    select, button, input { font-size: 18px; padding: 10px; margin: 6px 0; width: 100%; box-sizing: border-box; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .hint { opacity: .8; font-size: 14px; margin-top: 10px; }
    audio { width: 100%; margin-top: 12px; }
    details { margin-top: 14px; }
    .volrow { display: grid; grid-template-columns: 120px 1fr 70px; gap: 12px; align-items: center; margin-top: 10px; }
    input[type="range"] { width: 100%; margin: 0; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .checkrow { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
    .checkrow input[type="checkbox"] { width: auto; margin: 0; transform: scale(1.2); }
  </style>
</head>
<body>
  <h2>Radio</h2>

  <label for="station">Sender</label>
  <select id="station"></select>

  <div class="row">
    <button id="play">Play</button>
    <button id="stop">Stop</button>
  </div>

  <div class="volrow">
    <div>Lautstärke</div>
    <input id="vol" type="range" min="0" max="100" step="1" value="80" />
    <div class="mono" id="volLabel">80%</div>
  </div>

  <div class="checkrow">
    <input id="autoplay" type="checkbox" />
    <label for="autoplay">Autoplay beim Öffnen (letzter Sender)</label>
  </div>

  <audio id="audio" controls></audio>
  <div class="hint" id="status">Lade Senderliste…</div>

  <details>
    <summary>Sender hinzufügen (wird lokal im Browser gespeichert)</summary>

    <label for="newName">Name</label>
    <input id="newName" placeholder="z.B. NDR 2" />

    <label for="newUrl">Stream-URL</label>
    <input id="newUrl" placeholder="https://... (mp3/aac/m3u8)" />

    <div class="row">
      <button id="add">Hinzufügen</button>
      <button id="reset">Lokale Sender löschen</button>
    </div>

    <p class="hint">
      Gespeicherte Sender gelten nur auf diesem Gerät/Browser.
      Die Datei <code>/config/www/radio/radios.json</code> auf Home Assistant wird nicht verändert.
    </p>
  </details>

<script>
  const statusEl = document.getElementById('status');
  const stationSel = document.getElementById('station');
  const audio = document.getElementById('audio');
  const newNameEl = document.getElementById('newName');
  const newUrlEl = document.getElementById('newUrl');

  const volEl = document.getElementById('vol');
  const volLabelEl = document.getElementById('volLabel');

  const autoplayEl = document.getElementById('autoplay');

  const LS_KEY   = 'radios_override_v1';
  const LAST_KEY = 'radio_last_station_v1';
  const VOL_KEY  = 'radio_volume_v1';
  const AP_KEY   = 'radio_autoplay_enabled_v1';

  let baseRadios = {};
  let radios = {};

  async function loadBaseRadios() {
    // /local/ maps to config/www/
    const res = await fetch('/local/radio/radios.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('radios.json nicht erreichbar');
    baseRadios = await res.json();
  }

  function loadOverride() {
    const s = localStorage.getItem(LS_KEY);
    if (!s) return {};
    try {
      const obj = JSON.parse(s);
      return (obj && typeof obj === 'object') ? obj : {};
    } catch {
      return {};
    }
  }

  function saveOverride(overrideObj) {
    localStorage.setItem(LS_KEY, JSON.stringify(overrideObj));
  }

  function mergeRadios(baseObj, overrideObj) {
    return { ...baseObj, ...overrideObj };
  }

  function renderStations(selectedName) {
    const names = Object.keys(radios).sort((a,b) => a.localeCompare(b, 'de'));
    stationSel.innerHTML = '';
    for (const name of names) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      stationSel.appendChild(opt);
    }
    if (selectedName && radios[selectedName]) stationSel.value = selectedName;
  }

  function getSelectedName() {
    return stationSel.value;
  }

  function applyVolumeFromSlider() {
    const v = Number(volEl.value);                 // 0..100
    const norm = Math.max(0, Math.min(1, v / 100)); // 0..1
    audio.volume = norm;
    volLabelEl.textContent = `${v}%`;
    localStorage.setItem(VOL_KEY, String(v));
  }

  function loadVolume() {
    const saved = localStorage.getItem(VOL_KEY);
    const v = saved !== null ? Number(saved) : 80;
    const vv = Number.isFinite(v) ? Math.max(0, Math.min(100, v)) : 80;
    volEl.value = String(vv);
    applyVolumeFromSlider();
  }

  function loadAutoplaySetting() {
    const saved = localStorage.getItem(AP_KEY);
    // Default: aus
    const enabled = saved === '1';
    autoplayEl.checked = enabled;
    return enabled;
  }

  function saveAutoplaySetting(enabled) {
    localStorage.setItem(AP_KEY, enabled ? '1' : '0');
  }
function looksLikeM3U(url) {
  return /\.m3u(\?.*)?$/i.test(url);
}

function isHttpUrl(s) {
  return /^https?:\/\//i.test(s);
}

async function resolveIfM3U(url) {
  if (!looksLikeM3U(url)) return url;

  let res;
  try {
    res = await fetch(url, { cache: 'no-store' });
  } catch (e) {
    throw new Error('M3U konnte nicht geladen werden (evtl. CORS blockiert).');
  }
  if (!res.ok) throw new Error(`M3U nicht ladbar (${res.status})`);

  const text = await res.text();

  // Kommentare (#EXTM3U, #EXTINF, ...) ignorieren -> erste echte URL nehmen
  const lines = text
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(l => l && !l.startsWith('#'));

  const firstUrl = lines.find(isHttpUrl);
  statusEl.textContent = `M3U → ${firstUrl || 'keine URL gefunden'}`;
  if (!firstUrl) throw new Error('In der M3U keine Stream-URL gefunden');

  return firstUrl;
}
  
async function playSelected() {
  const name = getSelectedName();
  const originalUrl = radios[name];

  if (!originalUrl) {
    statusEl.textContent = 'Kein Stream für Auswahl gefunden.';
    return;
  }

  // merken für "letzter Sender"
  localStorage.setItem(LAST_KEY, name);

  try {
    statusEl.textContent = `Lade: ${name}…`;

    const resolvedUrl = await resolveIfM3U(originalUrl);

    audio.src = resolvedUrl;
    applyVolumeFromSlider();

    await audio.play();
    statusEl.textContent = `Spiele: ${name}`;
  } catch (err) {
    statusEl.textContent = `Play fehlgeschlagen: ${err}`;
  }
}
  
  function addStation() {
    const name = (newNameEl.value || '').trim();
    const url = (newUrlEl.value || '').trim();

    if (!name) { statusEl.textContent = 'Bitte Name eingeben.'; return; }
    if (!url || !/^https?:\/\//i.test(url)) { statusEl.textContent = 'Bitte gültige URL (http/https) eingeben.'; return; }

    const override = loadOverride();
    override[name] = url;
    saveOverride(override);

    radios = mergeRadios(baseRadios, override);
    renderStations(name);

    newNameEl.value = '';
    newUrlEl.value = '';
    statusEl.textContent = `Hinzugefügt (lokal): ${name}`;
  }

  function resetLocalStations() {
    localStorage.removeItem(LS_KEY);
    radios = { ...baseRadios };
    renderStations();
    statusEl.textContent = 'Lokale Sender gelöscht (nur Basisliste aktiv).';
  }

  // Events
  document.getElementById('play').addEventListener('click', () => playSelected());
  document.getElementById('stop').addEventListener('click', stop);
  document.getElementById('add').addEventListener('click', addStation);
  document.getElementById('reset').addEventListener('click', resetLocalStations);

  volEl.addEventListener('input', applyVolumeFromSlider);

  stationSel.addEventListener('change', () => {
    const name = getSelectedName();
    if (name) localStorage.setItem(LAST_KEY, name);
  });

  autoplayEl.addEventListener('change', () => {
    saveAutoplaySetting(autoplayEl.checked);
    statusEl.textContent = autoplayEl.checked
      ? 'Autoplay ist aktiviert.'
      : 'Autoplay ist deaktiviert.';
  });

  // Init
  (async function init() {
    try {
      loadVolume();
      const autoplayEnabled = loadAutoplaySetting();

      await loadBaseRadios();
      const override = loadOverride();
      radios = mergeRadios(baseRadios, override);

      const last = localStorage.getItem(LAST_KEY);
      renderStations(last && radios[last] ? last : undefined);

      statusEl.textContent = `Bereit. ${Object.keys(radios).length} Sender (inkl. lokale) geladen.`;

      // Autoplay nur wenn Checkbox an ist
      if (autoplayEnabled && last && radios[last]) {
        stationSel.value = last;
        setTimeout(() => playSelected(), 200);
      }
    } catch (e) {
      statusEl.textContent = 'Fehler: ' + e.message;
    }
  })();
</script>
</body>
</html>
